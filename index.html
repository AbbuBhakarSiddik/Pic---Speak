<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speech Topics Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: white;
      font-size: 3em;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.2em;
      margin-bottom: 40px;
    }

    .subtitle1 {
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.2em;
      margin-bottom: 40px;
      font-weight: bold;
      font-family: 'Times New Roman', Times, serif;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .legend {
      display: none;
    }

    .section-divider {
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
      margin: 60px 0 40px;
      border: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      perspective: 1000px;
    }

    .card {
      height: 280px;
      position: relative;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .card-front {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      position: relative;
    }

    .card-front.easy {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    .card-front.medium {
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    }

    .card-front.hard {
      background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
    }

    .card-icon {
      font-size: 4em;
      margin-bottom: 15px;
      filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.2));
    }

    .box-number {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2em;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
      animation: fadeIn 0.3s;
    }

    .modal-overlay.active {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.4s;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #ff4757;
      color: white;
      border: none;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      font-size: 1.5em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .modal-close:hover {
      background: #ff6b81;
      transform: rotate(90deg);
    }

    .modal-icon {
      font-size: 5em;
      text-align: center;
      margin-bottom: 20px;
    }

    .topic-title {
      font-size: 1.8em;
      font-weight: bold;
      color: #333;
      margin-bottom: 25px;
      text-align: center;
      line-height: 1.3;
    }

    .hints {
      width: 100%;
    }

    .hint-item {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px;
      margin: 12px 0;
      border-radius: 10px;
      font-size: 1em;
      line-height: 1.5;
    }

    .hint-number {
      font-weight: bold;
      margin-right: 5px;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      font-weight: 600;
    }

    .legend-color {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2em;
      }

      .grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
      }

      .card {
        height: 240px;
      }
    }
  </style>
</head>

    function createCard(topic, index, gridType) {
      const boxNumber = index + 1;
      return `
                <div class="card" onclick="openModal(${index}, '${gridType}')">
                    <div class="card-face card-front ${topic.difficulty}">
                        <div class="box-number">${boxNumber}</div>
                        <div class="card-icon">${topic.icon}</div>
                    </div>
                </div>
            `;
    }

    function openModal(index, gridType) {
      const topic = gridType === 'solo' ? shuffledSoloTopics[index] : shuffledTopics[index];
      document.getElementById('modalIcon').textContent = topic.icon;
      document.getElementById('modalTitle').textContent = topic.title;
      document.getElementById('modalHints').innerHTML = topic.hints.map((hint, i) => `
                <div class="hint-item">
                    <span class="hint-number">💡 ${i + 1}:</span> ${hint}
                </div>
            `).join('');
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    // Close modal when clicking outside
    document.getElementById('modalOverlay').addEventListener('click', function (e) {
      if (e.target === this) {
        closeModal();
      }
    });

    // Close modal with Escape key
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    // Shuffle topics for randomness
    const shuffledTopics = topics.sort(() => Math.random() - 0.5);
    const shuffledSoloTopics = soloTopics.sort(() => Math.random() - 0.5);

    // Render all cards
    document.getElementById('cardsGrid').innerHTML = shuffledTopics
      .map((topic, index) => createCard(topic, index, 'group'))
      .join('');

    document.getElementById('soloCardsGrid').innerHTML = shuffledSoloTopics
      .map((topic, index) => createCard(topic, index, 'solo'))
      .join('');

</body>
